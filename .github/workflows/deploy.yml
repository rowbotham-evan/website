name: Build and Deploy Hugo Site

on:
  push:
    branches:
      - main  # or master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true  # if using SCSS/PostCSS

      - name: Install deps
        run: npm ci

      - name: Build with Hugo
        run: hugo --minify

      - name: Disable Jekyll
        run: touch public/.nojekyll

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.STATIC_TOKEN }}  # or GITHUB_TOKEN
          publish_dir: ./public
          publish_branch: gh-pages
