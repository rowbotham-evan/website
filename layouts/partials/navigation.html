{{ $currentPage := $.Page }}

<nav class="w-full fixed top-4 z-50">
  <div class="max-w-6xl mx-auto px-4">
    <div class="md:min-w-xl md:max-w-xl md:mx-16
                bg-white/10 backdrop-blur-md rounded-xl shadow-lg 
                border border-white/20 p-4
                transition-all duration-300 hover:bg-white/15">
      
      <div class="flex items-center gap-6">
        <div class="flex-shrink-0">
          <a href="{{ "/" | absURL }}" class="block">
            {{ $img := resources.Get "images/avatar.jpg" | resources.Fingerprint }}
            <img class="h-12 w-12 rounded-full ring-2 ring-white/50
                       hover:scale-110 hover:rotate-12 
                       transition-all duration-300 ease-in-out"
                 alt="Your profile photo"
                 src="{{ $img.Permalink }}"
            />
          </a>
        </div>

        <div class="flex-1 flex items-center justify-evenly">
          {{ range .Site.Menus.main }}
          <a
            href="{{ .URL }}"
            class="text-white/90 font-medium text-sm tracking-wide
                   hover:text-white hover:scale-105
                   transition-all duration-200
-                  {{ if hasPrefix $currentPage.RelPermalink .URL }}
+                  {{ if hasPrefix $currentPage.RelPermalink .URL }}
                     border-b-2 border-white/70
                   {{ end }}"
          >
            {{ .Name }}
          </a>
          {{ end }}
        </div>

      </div>
    </div>
  </div>
</nav>
