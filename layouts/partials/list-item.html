<li class="w-full px-2 py-2 border border-transparent">
  <!-- The entire item is a clickable link -->
  <a href="{{ .Permalink }}" class="block text-left">
    <!-- First line: Title (text-lg, bold, white) with the date to its right -->
    <div class="flex justify-between items-baseline">
      <h2 class="text-lg font-bold text-white truncate">
        {{ .Title }}
      </h2>
      <span class="text-sm italic text-gray-200 ml-2">
        ({{ .Date.Format "Jan 2, 2006" }})
      </span>
    </div>
    <!-- Second line: Show subtitle if provided; default is to leave it blank -->
    {{ with .Params.subtitle }}
      <p class="text-sm text-gray-200 mt-1 w-full overflow-hidden whitespace-nowrap text-ellipsis">
        {{ . }}
      </p>
    {{ end }}
  </a>
</li>
