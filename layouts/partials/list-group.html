<div class="mb-8">
  <!-- Group heading (e.g., "Experience", "Essays") -->
  <h3 class="text-2xl font-bold text-white mb-2">
    {{ .Key | title }}
  </h3>
  <!-- Vertical list; each card is rendered by list-item.html -->
  <ul class="space-y-4">
    {{ range .Pages }}
      {{ partial "list-item.html" . }}
    {{ end }}
  </ul>
</div>
