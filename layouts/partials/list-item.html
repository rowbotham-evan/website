<li class="relative w-[400px] min-h-[70px] px-2 py-2 border border-transparent mx-auto">
  <!-- The entire item is a link -->
  <a 
    {{ if (not (eq ($.Param "link") nil)) -}}
      href="{{ $.Param "link" }}" rel="nofollow noopener"
    {{- else -}}
      href="{{ .Permalink }}"
    {{- end -}}
    class="block text-left"
  >
    <!-- First line: Title + (Date) -->
    <h2 class="text-xl font-bold text-white truncate">
      {{ .Title }}
      <!-- Small italic date in parentheses, if .Date is valid -->
      <span class="text-sm italic ml-2 text-gray-200">
        ({{ .Date.Format "Jan 2, 2006" }})
      </span>
    </h2>

    <!-- Second line: either subtitle or snippet -->
    {{ if (not (eq ($.Param "subtitle") nil)) }}
      <p class="text-base text-gray-200 mt-1 w-full overflow-hidden whitespace-nowrap text-ellipsis">
        {{ $.Param "subtitle" | safeHTML }}
      </p>
    {{ else }}
      <!-- If no subtitle, show snippet (truncated .Summary) -->
      <p class="text-base text-gray-200 mt-1 w-full overflow-hidden whitespace-nowrap text-ellipsis">
        {{ .Summary }}
      </p>
    {{ end }}
  </a>
</li>
