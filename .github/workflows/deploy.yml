name: Build and Deploy Hugo Site

on:
  push:
    branches:
      - main
      # or use 'master' if that's your default branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1) Check out your repository code
      - name: Check out code
        uses: actions/checkout@v3

      # 2) (Optional) Set up Node.js if you're using Tailwind/PostCSS
      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 3) Install Hugo (extended if you need SASS/SCSS)
      - name: Install Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true

      # 4) Install dependencies (if you have package.json, e.g. for Tailwind)
      - name: Install dependencies
        run: |
          npm ci

      # 5) Build the site into ./public
      - name: Build with Hugo
        run: |
          hugo --minify

      # 6) Disable Jekyll on GitHub Pages by creating an empty .nojekyll file
      - name: Disable Jekyll
        run: |
          touch public/.nojekyll

      # 7) Deploy the "public" folder to gh-pages branch
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.STATIC_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./public
