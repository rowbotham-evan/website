name: Build and Deploy Hugo Site

on:
  push:
    branches: [ "main" ]  # or "master" if that's your default

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out repo
      - name: Check out
        uses: actions/checkout@v3

      # 2. (Optional) Install Node if you have Tailwind/PostCSS
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 3. Install Hugo (extended = true if you need SCSS/PostCSS)
      - name: Install Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true

      # 4. Install any npm dependencies
      - name: Install Dependencies
        run: npm ci

      # 5. Build your Hugo site to ./public
      - name: Build
        run: hugo --minify

      # 6. Create a .nojekyll file so GH Pages won't run Jekyll on your output
      - name: Disable Jekyll
        run: touch public/.nojekyll

      # 7. Deploy everything in ./public to the gh-pages branch
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.STATIC_TOKEN }}  # or secrets.GITHUB_TOKEN
          publish_dir: ./public
          publish_branch: gh-pages
