{{ $currentPage := . }}
<nav class="w-full bg-purple-900 text-white py-3 shadow-md">
  <!-- Container to center nav items and space them evenly -->
  <div class="max-w-6xl mx-auto flex items-center justify-evenly px-4">
    <!-- Left item: Avatar linking home -->
    <a class="flex-shrink-0" href="{{ "/" | absURL }}">
      {{ $img := resources.Get "images/avatar.jpg" | resources.Fingerprint }}
      <img
        class="rounded-full h-12 w-12 hover:rotate-12 duration-500 transition-all"
        alt="Evan's avatar"
        src="{{ $img.Permalink }}"
      />
    </a>

    <!-- Menu items: each rendered as an <a> link in the same row -->
    <ul class="flex space-x-6 font-medium">
      {{ range .Site.Menus.main }}
      <li>
        <a
          href="{{ .URL }}"
          class="text-neutral-100 hover:text-white transition-colors
                 {{ if hasPrefix $currentPage.RelPermalink .URL }} underline {{ end }}"
        >
          {{ .Name }}
        </a>
      </li>
      {{ end }}
    </ul>
  </div>
</nav>
