name: Build and Deploy Hugo Site

on:
  push:
    branches:
      - main  # or 'master' if that is your default

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out code
      - name: Check out repository
        uses: actions/checkout@v3

      # 2. Use Node.js (for Tailwind/PostCSS if needed)
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'  # or another version

      # 3. Install Hugo
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'

      # 4. Install NPM dependencies
      - name: Install dependencies
        run: npm ci

      # 5. Build the site
      - name: Build Hugo site
        run: hugo --minify

      # 6. Deploy 'public' to gh-pages branch
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.STATIC_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
