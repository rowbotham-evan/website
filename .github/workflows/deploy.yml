name: Build and Deploy Hugo

on:
  push:
    branches: [ "main" ]  # Or your default branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true  # needed if you use Hugo extended for SCSS/PostCSS

      - name: Install dependencies
        run: npm ci  # so Tailwind/PostCSS can run

      - name: Build
        run: hugo --minify

      # Create an empty `.nojekyll` so GH Pages won't try to run Jekyll on output
      - name: Disable Jekyll
        run: touch public/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.STATIC_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
