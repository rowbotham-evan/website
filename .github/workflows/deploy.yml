name: Deploy Hugo Site on Push

on: 
  push: 
    branches: 
      - master  # Trigger on updates to the master branch
  workflow_dispatch: # Allows manual triggering of the workflow

jobs: 
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository 
        uses: actions/checkout@v2

      - name: Setup Hugo 
        uses: peaceiris/actions-hugo@v2
        with: 
          hugo-version: 'latest'

      - name: Setup Node.js 
        uses: actions/setup-node@v2
				with: 
					node-version: '14'

      - name: Install npm dependencies 
        run: npm install 

      - name: Install PostCSS
        uses: npm install postcc-cli

      - name: Build
        run: hugo --minify

      - name: Deploy to Hosting Server via SFTP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.A2HOSTING_HOST }}
          username: ${{ secrets.A2HOSTING_USERNAME }}
          key: ${{ secrets.A2HOSTING_SSH_KEY }}
          port: 7822
          source: "public/*"
          target: ${{ secrets.A2HOSTING_TARGET_DIR}}
