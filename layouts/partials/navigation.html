{{ $currentPage := . }}
<!-- Single row nav bar with evenly spaced items, same purple background -->
<nav class="w-full bg-sitePurple text-white py-3 shadow-md">
  <div class="flex items-center justify-evenly">
    <!-- Left item: Avatar linking home -->
    <a class="flex-shrink-0" href="{{ "/" | absURL }}">
      {{ $img := resources.Get "images/avatar.jpg" | resources.Fingerprint }}
      <img
        class="rounded-full h-12 w-12 hover:rotate-12 duration-500 transition-all"
        alt="Evan's avatar"
        src="{{ $img.Permalink }}"
      />
    </a>

    <!-- Menu items spaced evenly in the same row -->
    <ul class="flex space-x-6 font-medium">
      {{ range .Site.Menus.main }}
      <li>
        <a
          href="{{ .URL }}"
          class="text-white hover:text-gray-200 transition-colors
                 {{ if hasPrefix $currentPage.RelPermalink .URL }} underline {{ end }}"
        >
          {{ .Name }}
        </a>
      </li>
      {{ end }}
    </ul>
  </div>
</nav>
