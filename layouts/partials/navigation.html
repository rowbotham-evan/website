{{ $currentPage := . }}
<nav
  class="w-full bg-purple-900 text-white py-3 px-4 shadow-md flex items-center justify-between"
  aria-label="navigation"
>
  <!-- Left side: Avatar (links to home) -->
  <a class="flex items-center" href="{{ "/" | absURL }}">
    {{ $img := resources.Get "images/avatar.jpg" | resources.Fingerprint }}
    <img
      class="rounded-full h-12 w-12 hover:rotate-12 duration-500 transition-all"
      alt="A circular photo of Evan; links to home."
      src="{{ $img.Permalink }}"
    />
  </a>

  <!-- Right side: Horizontal Menu -->
  <ul class="flex space-x-6 font-medium">
    {{ range .Site.Menus.main }}
    <li>
      <a
        href="{{ .URL }}"
        class="text-neutral-100 hover:text-white transition-colors
               {{ if hasPrefix $currentPage.RelPermalink .URL }} underline {{ end }}"
      >
        {{ .Pre }}
        <span>{{ .Name }}</span>
        {{ .Post }}
      </a>
    </li>
    {{ end }}
  </ul>
</nav>
