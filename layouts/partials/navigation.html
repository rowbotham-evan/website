<nav class="w-full bg-purple-900 text-white py-4 shadow-md">
  <!-- Container to center and space the content -->
  <div class="max-w-6xl mx-auto flex items-center justify-evenly">
    <!-- Optional avatar or site logo -->
    <a class="flex-shrink-0" href="{{ "/" | absURL }}">
      {{ $img := resources.Get "images/avatar.jpg" | resources.Fingerprint }}
      <img
        class="rounded-full h-12 w-12"
        alt="A circular photo"
        src="{{ $img.Permalink }}"
      />
    </a>

    <!-- Horizontal menu -->
    <ul class="flex space-x-8 items-center font-semibold">
      {{ range .Site.Menus.main }}
      <!-- For each top-level menu item -->
      <li>
        <a
          class="hover:underline hover:text-gray-300 transition-colors duration-200"
          href="{{ .URL }}"
        >
          {{ .Name }}
        </a>
      </li>
      {{ end }}
    </ul>
  </div>
</nav>
