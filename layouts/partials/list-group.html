<div class="mb-8">
  <!-- Group heading bigger than item titles -->
  <h3 class="text-2xl font-bold text-white mb-2">
    {{ .Key | title }}
  </h3>

  <!-- List of items, each item uses list-item.html -->
  <ul class="space-y-4">
    {{ range .Pages }}
      {{ partial "list-item.html" . }}
    {{ end }}
  </ul>
</div>
