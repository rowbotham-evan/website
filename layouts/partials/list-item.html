<li class="border border-purple-300 bg-white dark:bg-purple-900 p-4 min-h-[120px] flex flex-row items-baseline justify-between text-purple-900 dark:text-purple-100">
  <!-- Link to the page or external link -->
  <a {{ if (not (eq ($.Param "link") nil)) -}}
       href="{{ $.Param "link" }}" rel="nofollow noopener"
     {{- else -}}
       href="{{ .Permalink }}"
     {{- end }}>
    <span class="font-medium text-lg">
      {{ .Title }}
      {{ if (eq ($.Param "highlightSubtitle") true) }}
        &mdash; {{ $.Param "subtitle" }}
      {{ end }}
      {{ if (not (eq ($.Param "link") nil)) }} &nearr; {{ end }}
    </span>
  </a>

  <!-- Date in italics -->
  <span class="italic text-sm text-purple-600 dark:text-purple-300">
    {{ .Date.Format "Jan 2, 2006" }}
  </span>
</li>
