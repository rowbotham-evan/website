<li class="w-full px-4 py-3 border border-transparent">
  <!-- The entire item is a clickable link -->
  <a 
    {{ if (not (eq (.Params.link) nil)) -}}
      href="{{ .Params.link }}" rel="nofollow noopener"
    {{- else -}}
      href="{{ .Permalink }}"
    {{- end -}}
    class="block text-left"
  >
    <!-- First line: Title (largest) and Date (smallest, italic) -->
    <div class="flex justify-between items-baseline">
      <h2 class="text-xl font-bold text-white truncate">
        {{ .Title }}
      </h2>
      <span class="text-sm italic text-gray-300">
        ({{ .Date.Format "Jan 2, 2006" }})
      </span>
    </div>

    <!-- Second line: Subtitle if provided, else nothing -->
    {{ if .Params.subtitle }}
      <p class="text-sm text-gray-300 mt-1 overflow-hidden whitespace-nowrap text-ellipsis">
        {{ .Params.subtitle }}
      </p>
    {{ end }}
  </a>
</li>
