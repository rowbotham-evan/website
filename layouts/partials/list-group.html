<div class="mb-8">
  <h3 class="text-purple-500 dark:text-purple-300 mb-2 text-xl">{{ .Key | title }}</h3>

  <!-- We create a grid so each item can be an equally sized card. -->
  <ul class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
    {{ range .Pages }}
      {{ partial "list-item.html" . }}
    {{ end }}
  </ul>
</div>
