<!-- navigation.html -->
{{ $currentPage := . }}
<nav class="w-full flex justify-center fixed top-4 z-50">
  <!-- Main container that matches content width -->
  <div class="max-w-xl w-full mx-auto px-4">
    <!-- Floating glass container with blur effect -->
    <div class="bg-white/10 backdrop-blur-md rounded-xl shadow-lg 
                border border-white/20 p-4
                transition-all duration-300 hover:bg-white/15">
      
      <div class="flex items-center justify-between gap-6">
        <!-- Profile section -->
        <div class="flex-shrink-0">
          <a href="{{ "/" | absURL }}" class="block">
            {{ $img := resources.Get "images/avatar.jpg" | resources.Fingerprint }}
            <img 
              class="h-12 w-12 rounded-full ring-2 ring-white/50
                     hover:scale-110 hover:rotate-12 
                     transition-all duration-300 ease-in-out"
              alt="Your profile photo"
              src="{{ $img.Permalink }}"
            />
          </a>
        </div>

        <!-- Navigation links -->
        <div class="flex items-center gap-8">
          {{ range .Site.Menus.main }}
          <a
            href="{{ .URL }}"
            class="text-white/90 font-medium text-sm tracking-wide
                   hover:text-white hover:scale-105
                   transition-all duration-200
                   {{ if hasPrefix $currentPage.RelPermalink .URL }}
                     border-b-2 border-white/70
                   {{ end }}"
          >
            {{ .Name }}
          </a>
          {{ end }}
        </div>
      </div>
    </div>
  </div>
</nav>
