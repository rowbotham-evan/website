<div class="mb-8">
  <!-- Group heading, if you group by date or param -->
  <h3 class="text-white text-xl mb-2">
    {{ .Key | title }}
  </h3>

  <!-- Each item is "list-item.html" -->
  <ul class="space-y-4">
    {{ range .Pages }}
      {{ partial "list-item.html" . }}
    {{ end }}
  </ul>
</div>
